name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # The emulator ships prebuilt in assets/qemu/ (see assets/README.md for its
  # source commit and how to regenerate it) - building it here takes over two
  # hours on a 2-core runner and it changes only when the machine model does.
  # What CI does enforce is that whatever is committed actually boots.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Verify asset provenance
        run: python3 build/test-provenance.py
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r frontend/. _site/
          cp -r assets _site/assets
      # venv because the runner's python is externally managed (PEP 668).
      - name: Install browser
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --quiet playwright
          .venv/bin/playwright install --with-deps chromium
      # Deliberately a plain server with no COOP/COEP, which is what GitHub
      # Pages gives a first-time visitor: this exercises coi-serviceworker
      # registering at scope / and reloading. build/serve.py sets the headers
      # itself and would mask a broken service worker.
      - name: Boot the machine and type at it
        run: |
          # Redirect the server's output: a background process holding the
          # step's stdout open can keep the step from ever finishing.
          (cd _site && python3 -m http.server 8777 >/tmp/serve.log 2>&1) &
          for i in $(seq 30); do curl -sf http://localhost:8777/ >/dev/null && break; sleep 1; done
          .venv/bin/python build/test-browser.py http://localhost:8777/ 420

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r frontend/. _site/
          cp -r assets _site/assets
          du -sh _site && ls _site _site/assets/qemu
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
